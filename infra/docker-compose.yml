name: oat

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oat_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-oat}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # The app's migrate-then-start entrypoint fails if it races Postgres, so compose must
      # wait for readiness rather than mere container start.
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oat} -d ${POSTGRES_DB:-oat}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oat}:${POSTGRES_PASSWORD:-oat_dev_password}@postgres:5432/${POSTGRES_DB:-oat}
      NODE_ENV: production
      # Bearer token for mutating endpoints. The default is a known dev value, NOT a secret:
      # this compose file is for local demo and evaluation. A real deployment must supply
      # OAT_API_TOKEN from the environment or a vault, never from this file.
      OAT_API_TOKEN: ${OAT_API_TOKEN:-oat_local_demo_token}
      # Seed demo data on first start so `docker compose up` yields a working demo.
      # Idempotent (the seed upserts). Set to 0 for any real deployment — a production
      # container must never invent asset data on boot.
      OAT_SEED_ON_START: ${OAT_SEED_ON_START:-1}
      # Scan is the fallback floor and stays on. SOTI is on here to demo the idle engine;
      # it is a mock until a tenant exists (assumption A2).
      OAT_CONNECTOR_SCAN: '1'
      OAT_CONNECTOR_SOTI: '1'
      # Phase 0 demo: use the mock SAP client. Real endpoint is a config swap (assumption A2).
      OAT_SAP_CLIENT: mock
    ports:
      - '${APP_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
