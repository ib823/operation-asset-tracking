name: oat

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oat_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-oat}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # The app's migrate-then-start entrypoint fails if it races Postgres, so compose must
      # wait for readiness rather than mere container start.
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oat} -d ${POSTGRES_DB:-oat}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oat}:${POSTGRES_PASSWORD:-oat_dev_password}@postgres:5432/${POSTGRES_DB:-oat}
      NODE_ENV: production
      # Auth.js session signing secret. The default is a known dev value, NOT a secret: this
      # compose file is for local demo and evaluation. A real deployment must supply
      # AUTH_SECRET from the environment or a vault, never from this file.
      AUTH_SECRET: ${AUTH_SECRET:-oat_local_demo_secret_change_me_in_any_real_deploy}
      # Required, or Auth.js throws UntrustedHost inside middleware — which Next swallows,
      # silently disabling the gate. See ADR-0012.
      AUTH_TRUST_HOST: 'true'
      # Hosts allowed to invoke Server Actions. REQUIRED behind a reverse proxy, or every
      # form in the app fails with "Invalid Server Actions request" — Next compares the
      # browser's origin against x-forwarded-host. Comma-separated, no protocol.
      OAT_ALLOWED_ORIGINS: ${OAT_ALLOWED_ORIGINS:-}
      # For MACHINE callers only (the scheduler's sweep, connector polls). Humans use
      # sessions + RBAC. Fails closed when unset.
      OAT_SERVICE_TOKEN: ${OAT_SERVICE_TOKEN:-oat_local_demo_service_token}
      # Seed demo data on first start so `docker compose up` yields a working demo.
      # Idempotent (the seed upserts). Set to 0 for any real deployment — a production
      # container must never invent asset data on boot.
      OAT_SEED_ON_START: ${OAT_SEED_ON_START:-1}
      # Scan is the fallback floor and stays on. SOTI is on here to demo the idle engine;
      # it is a mock until a tenant exists (assumption A2).
      OAT_CONNECTOR_SCAN: '1'
      OAT_CONNECTOR_SOTI: '1'
      # Phase 0 demo: use the mock SAP client. Real endpoint is a config swap (assumption A2).
      OAT_SAP_CLIENT: mock
    ports:
      - '${APP_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy

  # Emulated SNMP printer for the SNMP live-signal demo (docs/DEMO.md). A pure-Python SNMP
  # agent (snmpsim) that serves the Printer-MIB page counter as an increasing value, so the
  # worker polls a REAL SNMP device entirely inside this network — no external reach, nothing
  # faked. Demo scaffolding only; a real deployment points OAT_SNMP_TARGETS at real printers
  # and does not run this service.
  snmpsim:
    build:
      context: ./snmpsim
      dockerfile: Dockerfile
    restart: unless-stopped
    # UDP 161 is reachable as snmpsim:161 on the compose network. Not published to the host —
    # the demo is self-contained; the worker is the only client.

  # The scheduler: connector polls, the idle sweep, the nightly utilisation rollup.
  #
  # A separate process from the app, deliberately (ADR-0020) — same image, different command.
  # It is a different workload with a different lifecycle, and it needs Node's dgram/fs and a
  # Postgres driver, none of which belong in a bundle Next also builds for the Edge runtime.
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    command: ['pnpm', '--filter', '@oat/jobs', 'start']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oat}:${POSTGRES_PASSWORD:-oat_dev_password}@postgres:5432/${POSTGRES_DB:-oat}
      NODE_ENV: production
      # The app owns the schema; two containers racing `migrate deploy` at boot is a needless
      # lock fight.
      OAT_SKIP_MIGRATIONS: '1'
      OAT_CONNECTOR_SCAN: '1'
      OAT_CONNECTOR_SOTI: '1'
      OAT_CONNECTOR_OSQUERY: '0'
      # SNMP on, pointed at the emulated printer above. Its tag is a seeded PRINTER asset
      # (LAB-0005), so the poll resolves to a real asset and writes real signals. Point this
      # at real printers (TAG@host[:port], comma-separated) for a real deployment.
      OAT_CONNECTOR_SNMP: '1'
      OAT_SNMP_TARGETS: ${OAT_SNMP_TARGETS:-LAB-0005@snmpsim:161}
      OAT_SNMP_COMMUNITY: ${OAT_SNMP_COMMUNITY:-public}
      OAT_CONNECTOR_LIS: '0'
      OAT_SAP_CLIENT: mock
    depends_on:
      postgres:
        condition: service_healthy
      # Not for the app itself, but for its migrations: the worker must not touch tables the
      # app has not created yet.
      app:
        condition: service_started
      # The SNMP target must be listening before the worker polls it.
      snmpsim:
        condition: service_started

volumes:
  postgres-data:
