openapi: 3.1.0
info:
  title: Lablink Operational Asset Tracker (OAT) API
  version: 0.1.0
  description: |
    The operational layer for Lablink's laboratory assets: location, custodian, status,
    idle time and utilisation (RFP 2.6.4).

    **The SAP boundary.** SAP S/4HANA FI-AA is the authoritative FINANCIAL record of every
    asset. This API is the OPERATIONAL record. The two are linked by a shared asset ID
    (`sapAssetNo`) and are never merged.

      * `POST /sap/sync` pulls the SAP asset master INTO the OAT (one-way).
      * Only accounting-relevant events (disposal, impairment, cost-centre move) may ever be
        written back to SAP, behind an approval step.
      * Telemetry — heartbeat, idle, utilisation, location — is NEVER sent to SAP. This is
        enforced by the type system, not by convention. See
        `docs/decisions/0004-sap-boundary-typed-contract.md`.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:3000/api
    description: Local development

security:
  - sessionAuth: []

tags:
  - name: Assets
    description: The operational register.
  - name: Signals
    description: Observations from connectors. Append-only.
  - name: SAP
    description: One-way asset master sync.
  - name: Utilisation
    description: |
      Rollups and idle policy. Utilisation is measured against OBSERVED time, and absence of
      data is NOT zero — no coverage means no snapshot, which the UI must render as
      "not measured" (ADR-0015).
  - name: Reconciliation
    description: SAP records awaiting a human decision (ADR-0009).
  - name: Admin
    description: Scheduled maintenance operations. Machine callers only.
  - name: System

paths:
  /health:
    get:
      tags: [System]
      summary: Liveness and database reachability
      security: []
      responses:
        '200':
          description: Healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  database: { type: string, example: up }
        '503':
          description: The database is unreachable.

  /assets:
    get:
      tags: [Assets]
      summary: List the operational register
      description: |
        Requires `asset:read`. Results are SITE-SCOPED: a BRANCH user sees only their own
        site, and `siteId` cannot widen that — the scope narrows the query itself.
      parameters:
        - name: q
          in: query
          description: Match against tag, name, or SAP asset number.
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/AssetStatus' }
        - name: class
          in: query
          schema: { $ref: '#/components/schemas/AssetClass' }
        - name: siteId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Matching assets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  assets:
                    type: array
                    items: { $ref: '#/components/schemas/Asset' }

  /signals/scan:
    post:
      tags: [Signals]
      summary: Submit a barcode/QR scan
      description: |
        The fallback floor. With every automated connector disabled, this endpoint plus
        manual entry keeps the register fully usable — which is the graceful-degradation
        requirement.

        A scan is an assertion by a human standing in front of the asset, so it is the most
        authoritative signal available and overrides conflicting telemetry.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScanPayload' }
      responses:
        '200':
          description: Scan accepted and the asset re-projected.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IngestResult' }
        '400': { description: Malformed scan. }
        '401': { $ref: '#/components/responses/Unauthorised' }
        '404': { description: The tag is not in the register. }
        '503': { description: The scan connector is disabled. }

  /connectors/soti/poll:
    post:
      tags: [Signals]
      security:
        - serviceToken: []
      summary: Poll the SOTI MDM and ingest device reports
      description: |
        Feature-flagged by `OAT_CONNECTOR_SOTI`; returns 503 when disabled, which is a
        supported configuration rather than an error.

        Currently backed by a mock (assumption A2). The mock accepts `reports` in the body
        so demos and tests are deterministic; the real adapter fetches from the MDM and
        ignores the body.

        Note the class rules of ADR-0008: a SOTI report can evidence activity for an IT or
        SCANNER asset, but NOT for a LAB_INSTRUMENT, whose activity comes only from the LIS.
        For an instrument this records presence and nothing more.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reports:
                  type: array
                  items: { $ref: '#/components/schemas/SotiDeviceReport' }
      responses:
        '200':
          description: Reports ingested.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunResult' }
        '401': { $ref: '#/components/responses/Unauthorised' }
        '503': { description: The SOTI connector is disabled. }

  /sap/sync:
    post:
      tags: [SAP]
      summary: Pull the SAP asset master into the OAT
      description: |
        One-way and idempotent. Matches on `sapAssetNo`, falling back to serial number for
        assets tagged before finance capitalised them; SAP records with no match are created.

        This endpoint holds a read-only port and **cannot** write to SAP.
      responses:
        '200':
          description: Sync complete.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncResult' }
        '401': { $ref: '#/components/responses/Unauthorised' }

  /admin/sweep:
    post:
      tags: [Admin]
      security:
        - serviceToken: []
      summary: Re-project live assets against the clock
      description: |
        Idleness accrues because nothing is reported, so it cannot be discovered by waiting
        for a signal. A scan's TTL also expires purely on the clock (ADR-0010), so this sweep
        turns both kinds of silence into a status change. Scheduled via pg-boss in Phase 2.
      responses:
        '200':
          description: Sweep complete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  swept: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorised' }

  /reconciliation:
    get:
      tags: [Reconciliation]
      summary: SAP records the sync could not place
      description: |
        Requires `reconciliation:read`. Ordered oldest-first: age is what matters. An item
        open for three weeks is a problem; a long list of fresh ones is just last night's sync.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, RESOLVED, DISMISSED]
            default: OPEN
      responses:
        '200':
          description: Queue items.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReconciliationItem' }
        '401': { $ref: '#/components/responses/Unauthorised' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /reconciliation/{id}:
    post:
      tags: [Reconciliation]
      summary: Resolve a queue item
      description: |
        Requires `reconciliation:resolve`. Two outcomes, both human decisions:

          * `link`    — this SAP record is that OAT asset. Establishes the shared key.
          * `dismiss` — not ours to track. A reason is mandatory.

        There is deliberately NO "create asset" action. If an asset should be tracked, someone
        tags it physically and scans it in — which is the same act that makes the register true.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [action, assetId]
                  properties:
                    action: { type: string, enum: [link] }
                    assetId: { type: string }
                - type: object
                  required: [action, note]
                  properties:
                    action: { type: string, enum: [dismiss] }
                    note: { type: string, minLength: 1 }
      responses:
        '200': { description: Resolved. }
        '400': { description: Invalid request, or a dismissal with no reason. }
        '401': { $ref: '#/components/responses/Unauthorised' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Item or asset not found. }
        '409':
          description: |
            Already resolved by someone else, or the asset is already linked to a different
            SAP asset — never silently re-pointed.

  /assets/{tag}/utilisation:
    get:
      tags: [Utilisation]
      summary: Daily utilisation snapshots for one asset
      description: |
        Requires `utilisation:read`. Site-scoped.

        An EMPTY list means **not measured**, never 0%. A zero indistinguishable from
        ignorance is what would justify disposing of a busy machine (ADR-0015).
      parameters:
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Snapshots, most recent first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset:
                    type: object
                    properties:
                      id: { type: string }
                      tag: { type: string }
                      class: { $ref: '#/components/schemas/AssetClass' }
                      subType: { type: [string, 'null'] }
                  snapshots:
                    type: array
                    items: { $ref: '#/components/schemas/UtilisationSnapshot' }
        '401': { $ref: '#/components/responses/Unauthorised' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Not found, or at another site. }

  /idle-config:
    get:
      tags: [Utilisation]
      summary: The resolved idle policy per class, with provenance
      description: |
        Requires `utilisation:read`. Returns the RESOLVED value and WHERE it came from
        (ADR-0014) — a number whose origin you cannot see is a number nobody trusts.

        The built-in defaults are PROVISIONAL: ABeam's judgement, not Lablink's operational
        answer. No test can validate them.
      responses:
        '200':
          description: Resolved policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  classes:
                    type: array
                    items: { $ref: '#/components/schemas/ResolvedIdlePolicy' }
                  subTypeOverrides: { type: array, items: { $ref: '#/components/schemas/IdleConfig' } }
                  assetOverrides: { type: array, items: { $ref: '#/components/schemas/IdleConfig' } }
        '401': { $ref: '#/components/responses/Unauthorised' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [Utilisation]
      summary: Set an idle override at any level of the chain
      description: |
        Requires `idle-policy:manage` (HQ Lab Manager, Developer).

        Resolution is asset → sub-type → class → default. `activitySources` is deliberately
        NOT settable: it is the rule that keeps utilisation honest, not a tuning knob
        (ADR-0008/0014).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IdleConfig' }
      responses:
        '200': { description: Saved. }
        '400':
          description: |
            Invalid, or a key nothing matches — a sub-type no asset has is rejected rather
            than saved as a row that silently never applies.
        '401': { $ref: '#/components/responses/Unauthorised' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Utilisation]
      summary: Clear an override, falling back down the chain
      parameters:
        - name: scope
          in: query
          required: true
          schema: { type: string, enum: [CLASS, SUB_TYPE, ASSET] }
        - name: key
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: Cleared. }
        '404': { description: No such override — already the default. }

  /alerts:
    get:
      tags: [Utilisation]
      summary: Assets idle past their alert threshold
      description: |
        Requires `utilisation:read`. Site-scoped. Ordered longest-idle first: that is the
        disposal conversation, and the reason this list exists.
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [OPEN, ACKNOWLEDGED, RESOLVED], default: OPEN }
      responses:
        '200':
          description: Alerts.
        '401': { $ref: '#/components/responses/Unauthorised' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /alerts/{id}:
    post:
      tags: [Utilisation]
      summary: Acknowledge an idle alert
      description: |
        Says "a human has seen this", so the sweep stops re-raising it. Does NOT resolve it —
        the asset is still idle, and it resolves itself when the asset is used again. Nobody
        declares a machine busy by clicking a button.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Acknowledged. }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Not found. }
        '409': { description: Already acknowledged or resolved. }

  /admin/rollup:
    post:
      tags: [Admin]
      security:
        - serviceToken: []
      summary: Roll a local day of signals into utilisation snapshots
      description: |
        Idempotent — upserts on (asset, period), so re-running after a config change
        overwrites rather than duplicating.

        Only classes with a DEPLOYED activity source are rolled up, derived from the
        connector flags: instruments begin rolling up the day the LIS is enabled, and turning
        a connector off stops the rollups rather than silently converting them to zeroes
        (ADR-0015).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                day:
                  type: string
                  format: date-time
                  description: The local day to roll up. Defaults to yesterday — today is not over.
      responses:
        '200':
          description: Rollup summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RollupSummary' }
        '401': { $ref: '#/components/responses/Unauthorised' }

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: |
        Auth.js session cookie, obtained by signing in at `/signin`. Every route additionally
        checks a PERMISSION and a SITE SCOPE — being authenticated is not being authorised.

        Roles per RFP Appendix F: FINANCE, PURCHASING, BRANCH, HQ_LAB_MANAGER, IT, DEVELOPER.
        BRANCH users are scoped to their own site; the scope narrows the query, so it cannot
        be widened by passing another site's id.

    serviceToken:
      type: http
      scheme: bearer
      description: |
        For MACHINE callers only — the scheduler's idle sweep and connector polls, which have
        no session and no person behind them. `OAT_SERVICE_TOKEN`; fails closed (503) when
        unset. A human session does NOT authorise these endpoints, and this token grants
        nothing else.

  responses:
    Unauthorised:
      description: Not signed in, or an invalid/revoked session or service token.
    Forbidden:
      description: |
        Signed in, but lacking the required permission — or the asset is at another site.

  schemas:
    AssetStatus:
      type: string
      enum: [IN_USE, IDLE, UNDER_REPAIR, RETIRED]
      description: |
        `UNDER_REPAIR` and `RETIRED` are administrative: asserted by a human, and never
        overwritten by telemetry.

    AssetClass:
      type: string
      enum: [LAB_INSTRUMENT, IT, PRINTER, SCANNER, REUSABLE_COMPONENT, OTHER]
      description: Determines the idle threshold applied to the asset.

    Asset:
      type: object
      properties:
        id: { type: string }
        tag:
          type: string
          description: Barcode/QR value. Unique.
        sapAssetNo:
          type: [string, 'null']
          description: |
            Shared key to SAP FI-AA. Null means the master sync has not matched this asset
            yet — commonly because it is tagged and in use but not yet capitalised.
        name: { type: string }
        class: { $ref: '#/components/schemas/AssetClass' }
        status: { $ref: '#/components/schemas/AssetStatus' }
        site:
          type: object
          properties:
            id: { type: string }
            code: { type: string }
            name: { type: string }
        location: { type: [string, 'null'] }
        lastSeenAt:
          type: [string, 'null']
          format: date-time
          description: Most recent observation of any kind, including mere reachability.
        idleSince:
          type: [string, 'null']
          format: date-time
          description: |
            When the asset went quiet — not when we noticed. Null unless status is IDLE.

    ScanPayload:
      type: object
      required: [tag]
      properties:
        tag: { type: string }
        observedAt:
          type: string
          format: date-time
          description: Defaults to now. Supply it when submitting scans buffered offline.
        location: { type: string }
        status: { $ref: '#/components/schemas/AssetStatus' }
        custodianId: { type: string }
        scannedBy: { type: string }

    SotiDeviceReport:
      type: object
      required: [deviceId, assetRef, idleMinutes, reportedAt]
      properties:
        deviceId: { type: string }
        assetRef:
          type: string
          description: Asset tag or SAP asset number, per the MDM's custom field.
        idleMinutes:
          type: number
          minimum: 0
          description: |
            Minutes idle at the time of the report. Load-bearing: it dates the idle run from
            when the device went quiet, so an MDM flushing a backlog after an outage is not
            misread as fresh idleness.
        batteryPct: { type: number }
        location: { type: string }
        reportedAt: { type: string, format: date-time }

    IngestResult:
      type: object
      properties:
        accepted:
          type: integer
          description: Signals written.
        duplicates:
          type: integer
          description: Redeliveries suppressed on (source, dedupeKey).
        assetsUpdated:
          type: array
          items: { type: string }

    RunResult:
      allOf:
        - $ref: '#/components/schemas/IngestResult'
        - type: object
          properties:
            connector: { type: string }
            unmatched:
              type: array
              items: { type: string }
              description: |
                External references the connector reported that match no asset. Reported
                rather than auto-created: a misconfigured connector must not be able to
                populate the register.

    UtilisationSnapshot:
      type: object
      description: |
        A CACHE of a derivation, never a source of truth — always rebuildable from the
        append-only signal log (ADR-0006).
      properties:
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        observedMinutes:
          type: integer
          description: |
            Minutes within the period we had connector coverage for. THE DENOMINATOR — stored
            so the figure is auditable: 80% of a 2-hour window is a different claim from 80%
            of a full day.
        busyMinutes: { type: integer }
        idleMinutes: { type: integer }
        utilisationPct:
          type: number
          description: Busy as a percentage of OBSERVED time, not of the period. 0–100.

    ResolvedIdlePolicy:
      type: object
      properties:
        class: { $ref: '#/components/schemas/AssetClass' }
        thresholdMinutes: { type: integer }
        thresholdSource:
          type: string
          enum: [asset, sub-type, class, default]
          description: Where the value came from. `default` means it is still PROVISIONAL.
        alertAfterMinutes: { type: integer }
        alertSource: { type: string, enum: [asset, sub-type, class, default] }
        activitySources:
          description: |
            Which sources may evidence ACTIVITY for this class. Read-only. An empty list means
            scan-tracked only; `lis` alone means the class reports nothing until the LIS lands
            (ADR-0008).
          oneOf:
            - type: array
              items: { type: string }
            - type: string
              enum: ['*']
        defaultThresholdMinutes: { type: integer }

    IdleConfig:
      type: object
      required: [scope, key, thresholdMinutes]
      properties:
        scope: { type: string, enum: [CLASS, SUB_TYPE, ASSET] }
        key:
          type: string
          description: 'CLASS → "IT" · SUB_TYPE → "LAB_INSTRUMENT:Analyser" · ASSET → the asset id.'
        thresholdMinutes: { type: integer, minimum: 1 }
        alertAfterMinutes:
          type: [integer, 'null']
          description: Null inherits from the next level up — the two resolve independently.

    RollupSummary:
      type: object
      properties:
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        eligible: { type: integer }
        written: { type: integer }
        unobserved:
          type: integer
          description: |
            Eligible assets with no coverage. NO snapshot is written for them: that means
            "we do not know", which is not 0% and must never be shown as it.
        skippedClasses:
          type: array
          items: { type: string }
          description: Classes skipped because no connector feeding them is deployed.

    SyncResult:
      type: object
      description: |
        There is deliberately no `created`. The OAT never creates assets from SAP records —
        SAP knowing about an asset is not evidence that anyone tagged it, and a sync that can
        invent register rows can poison the register unattended (ADR-0009).
      properties:
        fetched: { type: integer }
        linked:
          type: integer
          description: Existing OAT assets newly matched to an SAP record.
        updated: { type: integer }
        queued:
          type: integer
          description: Records that could not be placed, now awaiting a human.

    ReconciliationItem:
      type: object
      properties:
        id: { type: string }
        sapAssetNo: { type: string }
        sapRecord:
          type: object
          description: The full SAP record, so a human can decide without re-querying SAP.
        reason:
          type: string
          enum: [NO_MATCH, UNKNOWN_COST_CENTRE, CONFLICTING_LINK]
        status:
          type: string
          enum: [OPEN, RESOLVED, DISMISSED]
        firstSeenAt: { type: string, format: date-time }
        lastSeenAt:
          type: string
          format: date-time
          description: Bumped by each sync that still cannot place it. Age matters more than count.
